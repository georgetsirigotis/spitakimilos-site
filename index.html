<!doctype html>
<html lang="el" id="htmlRoot">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title id="metaTitle">Spitaki Milos | Διαμονή στη Μήλο</title>
  <meta id="metaDesc" name="description" content="Spitaki Milos – διαμονή στη Μήλο (Τρυπητή) με βεράντες και θέα στη θάλασσα. Στείλε αίτημα διαθεσιμότητας ή επικοινώνησε στο WhatsApp." />
  <link id="canonicalLink" rel="canonical" href="https://spitakimilos.com/" />

  <link rel="alternate" hreflang="el" href="https://spitakimilos.com/?lang=el" />
  <link rel="alternate" hreflang="en" href="https://spitakimilos.com/?lang=en" />
  <link rel="alternate" hreflang="x-default" href="https://spitakimilos.com/" />

  <meta id="ogTitle" property="og:title" content="Spitaki Milos | Διαμονή στη Μήλο" />
  <meta id="ogDesc" property="og:description" content="Τρυπητή Μήλου • Βεράντες με θέα στη θάλασσα • Στείλε αίτημα διαθεσιμότητας" />
  <meta property="og:type" content="website" />
  <meta id="ogUrl" property="og:url" content="https://spitakimilos.com/" />

  <style>
   :root{
    --bgTop:#bfeaff;
    --bgMid:#f0fbff;
    --bgBottom:#ffe7b3;

    --card:rgba(255,255,255,.94);
    --card2:rgba(255,255,255,.88);

    --text:#08263a;
    --muted:#2f5c73;

    --accent:#0ea5e9;
    --accent2:#fb7185;
    --accent3:#f59e0b;

    --border:rgba(8,38,58,.12);
    --shadow:0 18px 55px rgba(8,38,58,.16);
  }

  *{box-sizing:border-box}

  html{
    scroll-behavior:smooth;
    width:100%;
    max-width:100%;
    overflow-x:hidden;
  }

  body{
    margin:0;
    width:100%;
    max-width:100%;
    overflow-x:hidden;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    color:var(--text);
    background:
      radial-gradient(1000px 520px at 18% 0%, rgba(14,165,233,.42), transparent 62%),
      radial-gradient(900px 520px at 88% 8%, rgba(251,113,133,.28), transparent 60%),
      radial-gradient(900px 520px at 70% 95%, rgba(245,158,11,.25), transparent 60%),
      linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 35%, var(--bgBottom) 100%);
  }

  img{max-width:100%}
  a{color:inherit;text-decoration:none}

  .wrap{
    max-width:1100px;
    width:min(1100px, calc(100% - 24px));
    margin:0 auto;
    padding:24px 12px;
  }

  .top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:22px;
  }

  .brand{display:flex;flex-direction:column;line-height:1.1;min-width:0}
  .brand span{font-size:13px;color:var(--muted)}

  .brand .logo{
    height: clamp(140px, 12vw, 220px);
    width: 640px;
    max-width: 100%;
    object-fit: contain;
    display:block;
    margin-bottom: 8px;
    mix-blend-mode: normal;
    filter: drop-shadow(0 2px 10px rgba(8,38,58,.18));
  }

  @media (max-width:880px){
    .brand .logo{
      height:156px;
    }
  }

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 14px;border-radius:14px;font-weight:650;cursor:pointer;
    transition:transform .08s ease, box-shadow .12s ease, background .12s ease;
    user-select:none;
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    color:#ffffff;
    border:none;
    box-shadow:0 10px 22px rgba(14,165,233,.22);
  }
  .btn.primary:hover{box-shadow:0 14px 28px rgba(14,165,233,.28)}
  .btn.ghost{
    background:rgba(255,255,255,.78);
    border:1px solid var(--border);
    color:var(--text);
  }
  .btn.ghost:hover{background:rgba(255,255,255,.90)}

  .langSwitch{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .langBtn{
    padding:10px 12px;
    border-radius:999px;
    font-weight:750;
    letter-spacing:.4px;
  }
  .langBtn.active{
    background:rgba(14,165,233,.18);
    border:1px solid rgba(14,165,233,.35);
  }

  .card{
    background:linear-gradient(180deg, var(--card), var(--card2));
    border:1px solid var(--border);
    border-radius:22px;
    box-shadow:var(--shadow);
    backdrop-filter:saturate(120%) blur(6px);
  }

  .heroIntro{
    padding:26px;
    margin-bottom:18px;
    min-width:0;
  }

  .heroIntro h1{
    margin:0 0 10px;
    font-size:36px;
    letter-spacing:-.2px;
  }

  .heroIntro p{
    margin:0;
    color:var(--muted);
    line-height:1.7;
    max-width:760px;
    font-size:17px;
  }

  .hero{
    display:grid;
    grid-template-columns:minmax(0, .72fr) minmax(0, 1.28fr);
    gap:18px;
    align-items:start;
    min-width:0;
  }

  .hero > .card{
    align-self:start;
    min-width:0;
  }

  .heroLeft{
    padding:22px;
    min-width:0;
  }

  .heroSideTitle{
    display:block;
    font-size:20px;
    margin-bottom:8px;
  }

  .heroSideText{
    margin:0 0 14px;
    color:var(--muted);
    line-height:1.6;
  }

  .tags{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 18px}
  .tag{
    padding:8px 10px;border-radius:999px;font-size:13px;
    background:rgba(14,165,233,.14);
    border:1px solid rgba(14,165,233,.22);
    color:#0b3a54;
  }

  .cta{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}

  .heroRight{
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:0;
    min-width:0;
    height:auto;
    overflow:hidden;
  }

  .galleryShell{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
    max-width:100%;
    min-width:0;
    overflow:hidden;
  }

  .featuredStage{
    position:relative;
    border-radius:22px;
    overflow:hidden;
    background:#fff;
    border:1px solid rgba(8,38,58,.14);
    box-shadow:0 12px 28px rgba(8,38,58,.10);
    width:100%;
    max-width:100%;
    min-width:0;
  }

  .featuredBtn{
    display:block;
    width:100%;
    max-width:100%;
    min-width:0;
    border:none;
    padding:0;
    background:transparent;
    cursor:zoom-in;
  }

  .featuredBtn img{
    display:block;
    width:100%;
    max-width:100%;
    height:360px;
    object-fit:cover;
    background:#fff;
    transition:transform .3s ease, filter .3s ease;
  }

  .featuredStage:hover .featuredBtn img{
    transform:scale(1.015);
    filter:saturate(1.03);
  }

  .featuredBtn:focus-visible{
    outline:none;
  }

  .featuredStage:has(.featuredBtn:focus-visible){
    box-shadow:
      0 0 0 4px rgba(14,165,233,.18),
      0 16px 32px rgba(8,38,58,.14);
  }

  .featuredOverlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    max-width:100%;
  }

  .galleryTopBar{
    position:absolute;
    top:12px;
    left:12px;
    right:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    max-width:calc(100% - 24px);
  }

  .galleryPill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:34px;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(8,38,58,.55);
    color:#fff;
    font-size:12px;
    font-weight:750;
    backdrop-filter:blur(8px);
    box-shadow:0 8px 20px rgba(0,0,0,.10);
    max-width:100%;
  }

  .galleryBottomBar{
    position:absolute;
    left:12px;
    right:12px;
    bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:end;
    gap:10px;
    max-width:calc(100% - 24px);
  }

  .featuredNav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    z-index:2;
    border:none;
    width:46px;
    height:46px;
    border-radius:999px;
    cursor:pointer;
    background:rgba(255,255,255,.22);
    color:#fff;
    font-size:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    backdrop-filter:blur(8px);
    box-shadow:0 10px 24px rgba(0,0,0,.12);
    transition:background .16s ease, transform .08s ease;
  }

  .featuredNav:hover{
    background:rgba(255,255,255,.30);
  }

  .featuredNav:active{
    transform:translateY(-50%) scale(.97);
  }

  .featuredPrev{left:12px;}
  .featuredNext{right:12px;}

  .galleryDots{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    padding:2px 0 4px;
    width:100%;
    max-width:100%;
    min-width:0;
  }

  .galleryDot{
    width:9px;
    height:9px;
    border:none;
    border-radius:999px;
    background:rgba(8,38,58,.18);
    cursor:pointer;
    transition:transform .16s ease, background .16s ease, width .16s ease;
  }

  .galleryDot:hover{
    background:rgba(14,165,233,.55);
  }

  .galleryDot.active{
    width:22px;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .galleryDot:focus-visible{
    outline:none;
    box-shadow:0 0 0 4px rgba(14,165,233,.18);
  }

  .featuredCaption{
    color:var(--muted);
    font-size:13px;
    line-height:1.55;
    min-height:20px;
    text-align:center;
    margin-top:-2px;
    width:100%;
    max-width:100%;
    min-width:0;
  }

  .thumbRail{
    display:flex;
    gap:10px;
    width:100%;
    max-width:100%;
    min-width:0;
    overflow-x:auto;
    overflow-y:hidden;
    padding:4px 2px 8px;
    scroll-snap-type:x proximity;
    -webkit-overflow-scrolling:touch;
  }

  .thumbRail::-webkit-scrollbar{height:8px;}
  .thumbRail::-webkit-scrollbar-track{
    background:rgba(8,38,58,.06);
    border-radius:999px;
  }
  .thumbRail::-webkit-scrollbar-thumb{
    background:rgba(14,165,233,.40);
    border-radius:999px;
  }

  .thumbBtn{
    flex:0 0 auto;
    width:110px;
    border:none;
    background:transparent;
    padding:0;
    border-radius:16px;
    cursor:pointer;
    scroll-snap-align:start;
  }

  .thumbBtn img{
    display:block;
    width:110px;
    height:82px;
    object-fit:cover;
    border-radius:16px;
    border:2px solid transparent;
    box-shadow:0 8px 18px rgba(8,38,58,.08);
    background:#fff;
    transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease, opacity .16s ease;
    opacity:.92;
  }

  .thumbBtn:hover img{
    transform:translateY(-2px);
    opacity:1;
  }

  .thumbBtn.active img{
    border-color:var(--accent);
    opacity:1;
    box-shadow:0 0 0 4px rgba(14,165,233,.16), 0 12px 22px rgba(8,38,58,.12);
  }

  .thumbBtn:focus-visible{
    outline:none;
  }

  .thumbBtn:focus-visible img{
    border-color:var(--accent2);
    box-shadow:0 0 0 4px rgba(251,113,133,.18), 0 12px 22px rgba(8,38,58,.12);
    opacity:1;
  }

  .galleryHint{
    text-align:center;
    color:rgba(8,38,58,.58);
    font-size:12px;
    margin-top:-2px;
    width:100%;
    max-width:100%;
    min-width:0;
  }

  .heroRight .mini{
    background:rgba(255,255,255,.92) !important;
    flex-shrink:0;
  }

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
  .mini{padding:16px}
  .mini b{display:block;margin-bottom:6px}
  .list{margin:0;padding-left:18px;color:var(--muted);line-height:1.7}

  .section{margin-top:18px}
  .footer{margin:26px 0 6px;color:rgba(8,38,58,.55);font-size:13px}

  .form{margin-top:10px}
  .formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .formGrid .full{grid-column:1 / -1}
  label{display:block;font-size:12px;color:rgba(8,38,58,.75);margin-bottom:6px}

  input, textarea, select{
    width:100%;
    padding:12px 12px;
    border-radius:14px;
    border:1px solid rgba(8,38,58,.16);
    background:rgba(255,255,255,.92);
    color:var(--text);
    outline:none;
    transition:border-color .12s ease, box-shadow .12s ease, transform .08s ease;
  }
  input:focus, textarea:focus, select:focus{
    border-color:rgba(14,165,233,.55);
    box-shadow:0 0 0 4px rgba(14,165,233,.18);
  }
  textarea{min-height:110px;resize:vertical}
  input::placeholder, textarea::placeholder{color:rgba(8,38,58,.45)}
  .helper{color:rgba(8,38,58,.60);font-size:12px;line-height:1.5;margin-top:8px}
  .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}

  .lightbox{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(8,38,58,.92);
    padding:24px;
    z-index:9999;
  }

  .lightbox.open{
    display:flex;
  }

  .lightboxInner{
    position:relative;
    width:min(100%, 1180px);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .lightboxImg{
    display:block;
    max-width:100%;
    max-height:82vh;
    width:auto;
    height:auto;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    background:#fff;
  }

  .lightboxBtn{
    position:absolute;
    border:none;
    width:52px;
    height:52px;
    border-radius:999px;
    cursor:pointer;
    background:rgba(255,255,255,.16);
    color:#fff;
    font-size:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    backdrop-filter:blur(6px);
    transition:background .15s ease, transform .08s ease;
  }

  .lightboxBtn:hover{
    background:rgba(255,255,255,.24);
  }

  .lightboxBtn:active{
    transform:scale(.97);
  }

  .lightboxClose{
    top:-12px;
    right:-12px;
  }

  .lightboxPrev{
    left:12px;
    top:50%;
    transform:translateY(-50%);
  }

  .lightboxNext{
    right:12px;
    top:50%;
    transform:translateY(-50%);
  }

  .lightboxPrev:active,
  .lightboxNext:active{
    transform:translateY(-50%) scale(.97);
  }

  .lightboxCaption{
    position:absolute;
    left:50%;
    bottom:-52px;
    transform:translateX(-50%);
    color:#fff;
    background:rgba(255,255,255,.12);
    padding:10px 14px;
    border-radius:999px;
    font-size:14px;
    white-space:nowrap;
    max-width:min(90vw, 760px);
    overflow:hidden;
    text-overflow:ellipsis;
  }

  @media (max-width:880px){
    .wrap{
      width:min(100%, calc(100% - 16px));
      padding:16px 8px;
    }

    .heroIntro h1{font-size:30px}
    .heroIntro p{font-size:16px}
    .hero{grid-template-columns:1fr}
    .grid{grid-template-columns:1fr}
    .formGrid{grid-template-columns:1fr}

    .featuredBtn img{height:255px;}
    .featuredNav{
      width:42px;
      height:42px;
      font-size:22px;
    }
    .featuredPrev{left:10px;}
    .featuredNext{right:10px;}

    .thumbBtn{width:96px;}
    .thumbBtn img{
      width:96px;
      height:74px;
    }

    .lightbox{
      padding:16px;
    }
    .lightboxImg{
      max-height:74vh;
    }
    .lightboxBtn{
      width:46px;
      height:46px;
      font-size:22px;
    }
    .lightboxClose{
      top:-6px;
      right:-6px;
    }
    .lightboxPrev{left:6px;}
    .lightboxNext{right:6px;}
    .lightboxCaption{
      bottom:-44px;
      font-size:13px;
      max-width:88vw;
    }
  }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <img class="logo" src="images/Spitaki_Logo.png" alt="Spitaki Milos" />
        <span data-i18n="brand_subtitle"></span>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">

        <a class="btn ghost" href="#info" data-i18n="nav_info"></a>
        <a class="btn primary" href="#contact" data-i18n="nav_contact"></a>
      </div>
    </div>

    <div class="card heroIntro">
      <h1 data-i18n="hero_h1"></h1>

    </div>

    <div class="hero">
      <div class="card heroLeft">
        <b class="heroSideTitle" data-i18n="hero_side_title"></b>
        <p class="heroSideText" data-i18n="hero_side_text"></p>

        <div class="tags">

          <span class="tag" data-i18n="tag_tv"></span>
          <span class="tag" data-i18n="tag_kitchen"></span>
          <span class="tag" data-i18n="tag_washer"></span>
          <span class="tag" data-i18n="tag_terraces"></span>
        </div>

        <div class="cta">
          <a class="btn primary" href="#contact" data-i18n="cta_request"></a>

              <img id="featuredImage" src="images/SPITAKIMILOS.jpg" alt="Spitaki Milos - Θέα" />

            <button class="featuredNav featuredPrev" id="featuredPrev" type="button" aria-label="Previous image">‹</button>

            <div class="featuredOverlay">

          <div class="featuredCaption" id="featuredCaption">Spitaki Milos</div>

          <div class="thumbRail" id="thumbRail">

            <button class="thumbBtn" type="button" data-index="2">
              <img
                src="images/FHD0050.JPG"
                data-i18n-alt="img_alt_terrace"
                alt="Spitaki Milos - Βεράντα"
                loading="eager"
                decoding="async"
              />
            </button>

            <button class="thumbBtn" type="button" data-index="3">
              <img
                src="images/BERANTA-1.jpg"
                alt="Spitaki Milos - Βεράντα 1"
                loading="lazy"
                decoding="async"
              />
            </button>

            <button class="thumbBtn" type="button" data-index="4">
              <img

                decoding="async"
              />

            <button class="thumbBtn" type="button" data-index="5">

            <button class="thumbBtn" type="button" data-index="7">

            <button class="thumbBtn" type="button" data-index="8">

      const logo = document.querySelector(".brand .logo");
      const infoBtn = document.querySelector('a[data-i18n="nav_info"]');
      const contactBtn = document.querySelector('a[data-i18n="nav_contact"]');

      if (!logo || !infoBtn || !contactBtn) return;

      let gap = 10;
      const parent = infoBtn.parentElement;
      if (parent) {
        const cs = getComputedStyle(parent);
        const g = cs.columnGap || cs.gap || "0";
        gap = parseFloat(g) || 0;
      }

      const w =
        infoBtn.getBoundingClientRect().width +
        contactBtn.getBoundingClientRect().width +
        gap;

      const w2 = w * 2;
      const clamped = Math.max(440, Math.min(Math.round(w2), 1040));
      logo.style.width = clamped + "px";
    }

    function getInitialLang() {
      const urlLang = new URLSearchParams(window.location.search).get("lang");
      if (urlLang && T[urlLang]) return urlLang;

      const saved = localStorage.getItem("site_lang");
      if (saved && T[saved]) return saved;

      const nav = (navigator.language || "").toLowerCase();
      if (nav.startsWith("en")) return "en";
      return "el";
    }

    function setUrlLangParam(lang) {
      const url = new URL(window.location.href);
      url.searchParams.set("lang", lang);
      window.history.replaceState({}, "", url.toString());
    }

    function lightboxIsOpen() {
      return lightbox.classList.contains("open");
    }

    function createDots() {
      galleryDots.innerHTML = "";
      dotButtons = galleryImages.map((img, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "galleryDot";
        btn.setAttribute("aria-label", `Image ${index + 1}`);
        btn.addEventListener("click", () => {
          setFeatured(index, true);
        });
        galleryDots.appendChild(btn);
        return btn;
      });
    }

    function updateLightboxContent(index) {
      const img = galleryImages[index];
      if (!img) return;

      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt || "";
      lightboxCaption.textContent = "Spitaki Milos";
    }

    function setFeatured(index, shouldScrollThumb = false) {
      if (!galleryImages.length) return;

      currentGalleryIndex = index;
      const img = galleryImages[index];

      featuredImage.src = img.src;
      featuredImage.alt = img.alt || "";
      featuredCaption.textContent = "Spitaki Milos";
      galleryCounter.textContent = `${index + 1} / ${galleryImages.length}`;

      thumbButtons.forEach((btn, btnIndex) => {
        btn.classList.toggle("active", btnIndex === index);
      });

      dotButtons.forEach((btn, btnIndex) => {
        btn.classList.toggle("active", btnIndex === index);
      });

      if (shouldScrollThumb && thumbButtons[index]) {
        thumbButtons[index].scrollIntoView({
          behavior: "smooth",
          inline: "center",
          block: "nearest"
        });
      }

      if (lightboxIsOpen()) {
        updateLightboxContent(index);
      }
    }

    function openLightbox(index = currentGalleryIndex) {
      currentGalleryIndex = index;
      updateLightboxContent(currentGalleryIndex);
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightboxModal() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function showPrevImage() {
      if (!galleryImages.length) return;
      const nextIndex = (currentGalleryIndex - 1 + galleryImages.length) % galleryImages.length;
      setFeatured(nextIndex, true);
    }

    function showNextImage() {
      if (!galleryImages.length) return;
      const nextIndex = (currentGalleryIndex + 1) % galleryImages.length;
      setFeatured(nextIndex, true);
    }

    function initGallery() {
      thumbButtons = Array.from(document.querySelectorAll(".thumbBtn"));
      galleryImages = thumbButtons.map((btn) => btn.querySelector("img"));

      thumbButtons.forEach((btn, index) => {
        btn.addEventListener("click", () => {
          setFeatured(index, true);
        });
      });

      createDots();
      setFeatured(0);
    }

    function applyTranslations(lang) {
      const tr = T[lang];

      document.getElementById("htmlRoot").setAttribute("lang", lang);
      document.title = tr.meta_title;

      const metaTitle = document.getElementById("metaTitle");
      if (metaTitle) metaTitle.textContent = tr.meta_title;

      const metaDesc = document.getElementById("metaDesc");
      if (metaDesc) metaDesc.setAttribute("content", tr.meta_desc);

      const ogTitle = document.getElementById("ogTitle");
      if (ogTitle) ogTitle.setAttribute("content", tr.og_title);

      const ogDesc = document.getElementById("ogDesc");
      if (ogDesc) ogDesc.setAttribute("content", tr.og_desc);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        const val = tr[key];
        if (typeof val === "undefined") return;

        const isHtml = el.getAttribute("data-i18n-html") === "true";
        if (isHtml) el.innerHTML = val;
        else el.textContent = val;
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
        const key = el.getAttribute("data-i18n-placeholder");
        const val = tr[key];
        if (typeof val === "undefined") return;
        el.setAttribute("placeholder", val);
      });

      document.querySelectorAll("[data-i18n-alt]").forEach((el) => {
        const key = el.getAttribute("data-i18n-alt");
        const val = tr[key];
        if (typeof val === "undefined") return;
        el.setAttribute("alt", val);
      });

      const btnEL = document.getElementById("btnEL");
      const btnEN = document.getElementById("btnEN");
      btnEL.classList.toggle("active", lang === "el");
      btnEN.classList.toggle("active", lang === "en");

      createDots();
      setFeatured(currentGalleryIndex);
      scheduleLogoSync();
    }

    function setLang(lang) {
      if (!T[lang]) return;
      currentLang = lang;
      localStorage.setItem("site_lang", lang);
      setUrlLangParam(lang);
      applyTranslations(lang);
      updateWhatsAppLink();
    }

    function buildMessage() {
      const tr = T[currentLang];
      const f = document.getElementById("inquiryForm");
      const name = f.name.value.trim();
      const phone = f.phone.value.trim();
      const email = f.email.value.trim();
      const guests = f.guests.value;
      const checkin = f.checkin.value;
      const checkout = f.checkout.value;
      const msg = f.message.value.trim();

      const lines = [
        tr.email_greeting,
        "",
        tr.email_intro,
        `• ${tr.email_name}: ${name}`,
        `• ${tr.email_email}: ${email}`,
        phone ? `• ${tr.email_phone}: ${phone}` : null,
        `• ${tr.email_guests}: ${guests}`,
        `• ${tr.email_checkin}: ${checkin}`,
        `• ${tr.email_checkout}: ${checkout}`,
        msg ? "" : null,
        msg ? `${tr.email_message}:` : null,
        msg ? msg : null,
        "",
        tr.email_thanks
      ].filter(Boolean);

      return lines.join("\n");
    }

    function composeEmail(e) {
      e.preventDefault();
      const tr = T[currentLang];

      const f = document.getElementById("inquiryForm");
      const checkin = f.checkin.value;
      const checkout = f.checkout.value;

      if (checkin && checkout && checkout <= checkin) {
        alert(tr.alert_dates);
        return false;
      }

      const subject = tr.email_subject;
      const body = buildMessage();
      const mailto = `mailto:${DEST_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
      return false;
    }

    function updateWhatsAppLink() {
      const f = document.getElementById("inquiryForm");
      if (!f) return;
      const body = buildMessage();
      const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(body)}`;
      const waBtn = document.getElementById("waBtn");
      if (waBtn) waBtn.href = url;
    }

    function addSwipeSupport(element, onSwipeLeft, onSwipeRight) {
      let startX = 0;
      let startY = 0;
      let endX = 0;
      let endY = 0;

      element.addEventListener("touchstart", (e) => {
        const t = e.changedTouches[0];
        startX = t.clientX;
        startY = t.clientY;
        endX = t.clientX;
        endY = t.clientY;
      }, { passive: true });

      element.addEventListener("touchmove", (e) => {
        const t = e.changedTouches[0];
        endX = t.clientX;
        endY = t.clientY;
      }, { passive: true });

      element.addEventListener("touchend", () => {
        const diffX = endX - startX;
        const diffY = endY - startY;

        if (Math.abs(diffX) > 45 && Math.abs(diffX) > Math.abs(diffY)) {
          suppressFeaturedClick = true;
          setTimeout(() => { suppressFeaturedClick = false; }, 320);

          if (diffX < 0) onSwipeLeft();
          else onSwipeRight();
        }
      }, { passive: true });
    }

    document.addEventListener("input", (e) => {
      if (e.target && e.target.closest("#inquiryForm")) updateWhatsAppLink();
    });

    featuredPrev.addEventListener("click", (e) => {
      e.stopPropagation();
      showPrevImage();
    });

    featuredNext.addEventListener("click", (e) => {
      e.stopPropagation();
      showNextImage();
    });

    featuredBtn.addEventListener("click", () => {
      if (suppressFeaturedClick) return;
      openLightbox(currentGalleryIndex);
    });

    lightboxClose.addEventListener("click", closeLightboxModal);
    lightboxPrev.addEventListener("click", () => {
      showPrevImage();
      updateLightboxContent(currentGalleryIndex);
    });
    lightboxNext.addEventListener("click", () => {
      showNextImage();
      updateLightboxContent(currentGalleryIndex);
    });

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) {
        closeLightboxModal();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (lightboxIsOpen()) {
        if (e.key === "Escape") {
          closeLightboxModal();
        } else if (e.key === "ArrowLeft") {
          showPrevImage();
          updateLightboxContent(currentGalleryIndex);
        } else if (e.key === "ArrowRight") {
          showNextImage();
          updateLightboxContent(currentGalleryIndex);
        }
        return;
      }

      if (e.key === "ArrowLeft") {
        showPrevImage();
      } else if (e.key === "ArrowRight") {
        showNextImage();
      }
    });

    addSwipeSupport(featuredStage, () => {
      showNextImage();
    }, () => {
      showPrevImage();
    });

    addSwipeSupport(lightboxInner, () => {
      showNextImage();
      updateLightboxContent(currentGalleryIndex);
    }, () => {
      showPrevImage();
      updateLightboxContent(currentGalleryIndex);
    });

    document.getElementById("btnEL").addEventListener("click", () => setLang("el"));
    document.getElementById("btnEN").addEventListener("click", () => setLang("en"));

    window.addEventListener("resize", scheduleLogoSync);

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(scheduleLogoSync);
    }

    initGallery();
    setLang(getInitialLang());
    scheduleLogoSync();
    updateWhatsAppLink();
  </script>
</body>
</html>
