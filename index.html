<!doctype html>
<html lang="el" id="htmlRoot">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title id="metaTitle">Spitaki Milos | Διαμονή στη Μήλο</title>
  <meta id="metaDesc" name="description" content="Spitaki Milos – ιδιωτική διαμονή στην Τρυπητή Μήλου με βεράντες και θέα στη θάλασσα. Κράτηση μέσω Airbnb ή Booking.com, ή άμεσο αίτημα διαθεσιμότητας." />
  <link id="canonicalLink" rel="canonical" href="https://spitakimilos.com/" />

  <link rel="alternate" hreflang="el" href="https://spitakimilos.com/?lang=el" />
  <link rel="alternate" hreflang="en" href="https://spitakimilos.com/?lang=en" />
  <link rel="alternate" hreflang="x-default" href="https://spitakimilos.com/" />

  <meta id="ogTitle" property="og:title" content="Spitaki Milos | Διαμονή στη Μήλο" />
  <meta id="ogDesc" property="og:description" content="Τρυπητή Μήλου • Βεράντες με θέα στη θάλασσα • Κράτηση μέσω Airbnb ή Booking.com" />
  <meta property="og:type" content="website" />
  <meta id="ogUrl" property="og:url" content="https://spitakimilos.com/" />

  <style>
    :root{
      --bgTop:#c7ecff;
      --bgMid:#f7fcff;
      --bgBottom:#ffedc8;

      --card:rgba(255,255,255,.94);
      --card2:rgba(255,255,255,.86);
      --glass:rgba(255,255,255,.72);

      --text:#08263a;
      --muted:#2f5c73;

      --accent:#0ea5e9;
      --accent2:#fb7185;
      --accent3:#f59e0b;
      --accentDark:#0b7fb4;

      --border:rgba(8,38,58,.11);
      --shadow:0 18px 55px rgba(8,38,58,.16);
      --shadowSoft:0 12px 30px rgba(8,38,58,.09);

      --airbnb:#FF385C;
      --booking:#003580;
      --success:#10b981;
      --gold:#c99a2e;
    }

    *{box-sizing:border-box}

    html{
      scroll-behavior:smooth;
      width:100%;
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 520px at 18% 0%, rgba(14,165,233,.42), transparent 62%),
        radial-gradient(900px 520px at 88% 8%, rgba(251,113,133,.22), transparent 60%),
        radial-gradient(900px 520px at 70% 95%, rgba(245,158,11,.18), transparent 60%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 35%, var(--bgBottom) 100%);
    }

    img{max-width:100%}
    a{color:inherit;text-decoration:none}

    .wrap{
      max-width:1180px;
      width:min(1180px, calc(100% - 24px));
      margin:0 auto;
      padding:18px 12px 120px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      flex-wrap:wrap;
      gap:14px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      min-width:0;
    }

    .brand span{
      font-size:13px;
      color:var(--muted);
    }

    .brand .logo{
      height:clamp(140px, 12vw, 220px);
      width:660px;
      max-width:100%;
      object-fit:contain;
      display:block;
      margin-bottom:8px;
      filter:drop-shadow(0 2px 10px rgba(8,38,58,.18));
    }

    .topActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 14px;
      border-radius:15px;
      font-weight:750;
      cursor:pointer;
      transition:transform .08s ease, box-shadow .14s ease, background .14s ease, border-color .14s ease;
      user-select:none;
      border:1px solid transparent;
      line-height:1.2;
    }

    .btn:active{transform:translateY(1px)}

    .btn.primary{
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      color:#fff;
      border:none;
      box-shadow:0 12px 24px rgba(14,165,233,.24);
    }

    .btn.primary:hover{
      box-shadow:0 16px 30px rgba(14,165,233,.30);
    }

    .btn.ghost{
      background:rgba(255,255,255,.84);
      border:1px solid var(--border);
      color:var(--text);
      backdrop-filter:blur(10px);
    }

    .btn.ghost:hover{
      background:rgba(255,255,255,.95);
      box-shadow:0 10px 22px rgba(8,38,58,.08);
    }

    .btn.full{width:100%}

    .langSwitch{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .langBtn{
      padding:10px 12px;
      border-radius:999px;
      font-weight:800;
      letter-spacing:.4px;
    }

    .langBtn.active{
      background:rgba(14,165,233,.18);
      border:1px solid rgba(14,165,233,.35);
    }

    .card{
      background:linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid var(--border);
      border-radius:26px;
      box-shadow:var(--shadow);
      backdrop-filter:saturate(125%) blur(8px);
    }

    .heroBanner{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:18px;
      margin-bottom:18px;
      align-items:stretch;
    }

    .heroIntro{
      padding:30px;
      position:relative;
      overflow:hidden;
      min-width:0;
      background:
        radial-gradient(500px 240px at 0% 0%, rgba(14,165,233,.12), transparent 70%),
        radial-gradient(480px 260px at 100% 100%, rgba(251,113,133,.10), transparent 70%),
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88));
    }

    .heroKicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(8,38,58,.08);
      box-shadow:0 8px 18px rgba(8,38,58,.05);
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
    }

    .heroKickerDot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--success);
      box-shadow:0 0 0 6px rgba(16,185,129,.12);
    }

    .heroIntro h1{
      margin:0 0 12px;
      font-size:44px;
      line-height:1.02;
      letter-spacing:-.45px;
      max-width:720px;
    }

    .heroIntro p{
      margin:0;
      color:var(--muted);
      line-height:1.8;
      max-width:760px;
      font-size:17px;
    }

    .heroBadges{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .heroBadge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(14,165,233,.10);
      border:1px solid rgba(14,165,233,.14);
      color:#0b4f71;
      font-size:13px;
      font-weight:700;
    }

    .heroMiniPanel{
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.88));
    }

    .miniPanelTitle{
      margin:0;
      font-size:18px;
      font-weight:850;
    }

    .miniPanelText{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .miniStats{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .miniStat{
      background:rgba(14,165,233,.06);
      border:1px solid rgba(14,165,233,.10);
      border-radius:18px;
      padding:14px;
    }

    .miniStatLabel{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .miniStatValue{
      display:block;
      font-size:16px;
      font-weight:850;
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(0,.72fr) minmax(0,1.28fr);
      gap:18px;
      align-items:start;
      margin-bottom:18px;
    }

    .hero > .card{
      min-width:0;
    }

    .heroLeft{
      padding:22px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .heroSideTitle{
      display:block;
      font-size:20px;
      margin-bottom:8px;
      font-weight:850;
    }

    .heroSideText{
      margin:0;
      color:var(--muted);
      line-height:1.75;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:2px 0 0;
    }

    .tag{
      padding:8px 11px;
      border-radius:999px;
      font-size:13px;
      background:rgba(14,165,233,.14);
      border:1px solid rgba(14,165,233,.22);
      color:#0b3a54;
      font-weight:700;
    }

    .bookingPanel{
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.92));
      border:1px solid rgba(8,38,58,.09);
      border-radius:24px;
      padding:18px;
      box-shadow:0 14px 30px rgba(8,38,58,.08);
    }

    .bookingPanelHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .bookingPanelTitle{
      font-size:18px;
      font-weight:850;
      margin:0;
    }

    .bookingPanelSub{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
    }

    .miniBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(16,185,129,.10);
      color:#0b6a4a;
      border:1px solid rgba(16,185,129,.18);
      font-size:12px;
      font-weight:850;
      white-space:nowrap;
    }

    .ctaStack{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:4px;
    }

    .ctaRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .marketBtn{
      background:rgba(255,255,255,.98);
      border:1px solid rgba(8,38,58,.12);
      box-shadow:0 10px 22px rgba(8,38,58,.08);
      font-weight:850;
      min-height:50px;
    }

    .marketBtn:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 26px rgba(8,38,58,.11);
    }

    .airbnbBtn{
      border-color:rgba(255,56,92,.28);
    }

    .airbnbBtn:hover{
      border-color:rgba(255,56,92,.46);
    }

    .bookingBtn{
      border-color:rgba(0,53,128,.22);
    }

    .bookingBtn:hover{
      border-color:rgba(0,53,128,.42);
    }

    .brandMark{
      width:22px;
      height:22px;
      min-width:22px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 10px rgba(8,38,58,.10);
    }

    .brandMark svg{
      width:14px;
      height:14px;
      display:block;
    }

    .airbnbMark{
      background:rgba(255,56,92,.14);
      color:var(--airbnb);
    }

    .bookingMark{
      background:rgba(0,53,128,.10);
      color:var(--booking);
      font-size:12px;
      font-weight:850;
      letter-spacing:.2px;
    }

    .supportBtn{
      background:rgba(255,255,255,.82);
    }

    .ctaHint{
      color:var(--muted);
      font-size:12px;
      line-height:1.65;
      margin-top:2px;
    }

    .statsStrip{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:2px;
    }

    .statCard{
      background:rgba(14,165,233,.06);
      border:1px solid rgba(14,165,233,.12);
      border-radius:18px;
      padding:12px;
    }

    .statLabel{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .statValue{
      font-size:15px;
      font-weight:850;
    }

    .heroRight{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow:hidden;
    }

    .galleryShell{
      display:flex;
      flex-direction:column;
      gap:10px;
      width:100%;
      overflow:hidden;
    }

    .featuredStage{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(8,38,58,.14);
      box-shadow:0 12px 28px rgba(8,38,58,.10);
      width:100%;
    }

    .featuredBtn{
      display:block;
      width:100%;
      border:none;
      padding:0;
      background:transparent;
      cursor:zoom-in;
    }

    .featuredBtn img{
      display:block;
      width:100%;
      height:410px;
      object-fit:cover;
      background:#fff;
      transition:transform .3s ease, filter .3s ease;
    }

    .featuredStage:hover .featuredBtn img{
      transform:scale(1.015);
      filter:saturate(1.03);
    }

    .featuredBtn:focus-visible{
      outline:none;
    }

    .featuredStage:has(.featuredBtn:focus-visible){
      box-shadow:
        0 0 0 4px rgba(14,165,233,.18),
        0 16px 32px rgba(8,38,58,.14);
    }

    .featuredOverlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      max-width:100%;
    }

    .galleryTopBar{
      position:absolute;
      top:12px;
      left:12px;
      right:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      max-width:calc(100% - 24px);
    }

    .galleryPill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(8,38,58,.56);
      color:#fff;
      font-size:12px;
      font-weight:750;
      backdrop-filter:blur(8px);
      box-shadow:0 8px 20px rgba(0,0,0,.10);
      max-width:100%;
    }

    .galleryBottomBar{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:10px;
      max-width:calc(100% - 24px);
    }

    .featuredNav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:2;
      border:none;
      width:46px;
      height:46px;
      border-radius:999px;
      cursor:pointer;
      background:rgba(255,255,255,.22);
      color:#fff;
      font-size:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(8px);
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      transition:background .16s ease, transform .08s ease;
    }

    .featuredNav:hover{
      background:rgba(255,255,255,.30);
    }

    .featuredNav:active{
      transform:translateY(-50%) scale(.97);
    }

    .featuredPrev{left:12px;}
    .featuredNext{right:12px;}

    .galleryDots{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      padding:2px 0 4px;
      width:100%;
    }

    .galleryDot{
      width:9px;
      height:9px;
      border:none;
      border-radius:999px;
      background:rgba(8,38,58,.18);
      cursor:pointer;
      transition:transform .16s ease, background .16s ease, width .16s ease;
    }

    .galleryDot:hover{
      background:rgba(14,165,233,.55);
    }

    .galleryDot.active{
      width:22px;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .galleryDot:focus-visible{
      outline:none;
      box-shadow:0 0 0 4px rgba(14,165,233,.18);
    }

    .featuredCaption{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      min-height:20px;
      text-align:center;
      margin-top:-2px;
      width:100%;
    }

    .thumbRail{
      display:flex;
      gap:10px;
      width:100%;
      overflow-x:auto;
      overflow-y:hidden;
      padding:4px 2px 8px;
      scroll-snap-type:x proximity;
      -webkit-overflow-scrolling:touch;
    }

    .thumbRail::-webkit-scrollbar{height:8px;}
    .thumbRail::-webkit-scrollbar-track{
      background:rgba(8,38,58,.06);
      border-radius:999px;
    }
    .thumbRail::-webkit-scrollbar-thumb{
      background:rgba(14,165,233,.40);
      border-radius:999px;
    }

    .thumbBtn{
      flex:0 0 auto;
      width:110px;
      border:none;
      background:transparent;
      padding:0;
      border-radius:16px;
      cursor:pointer;
      scroll-snap-align:start;
    }

    .thumbBtn img{
      display:block;
      width:110px;
      height:82px;
      object-fit:cover;
      border-radius:16px;
      border:2px solid transparent;
      box-shadow:0 8px 18px rgba(8,38,58,.08);
      background:#fff;
      transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease, opacity .16s ease;
      opacity:.92;
    }

    .thumbBtn:hover img{
      transform:translateY(-2px);
      opacity:1;
    }

    .thumbBtn.active img{
      border-color:var(--accent);
      opacity:1;
      box-shadow:0 0 0 4px rgba(14,165,233,.16), 0 12px 22px rgba(8,38,58,.12);
    }

    .thumbBtn:focus-visible{
      outline:none;
    }

    .thumbBtn:focus-visible img{
      border-color:var(--accent2);
      box-shadow:0 0 0 4px rgba(251,113,133,.18), 0 12px 22px rgba(8,38,58,.12);
      opacity:1;
    }

    .galleryHint{
      text-align:center;
      color:rgba(8,38,58,.58);
      font-size:12px;
      margin-top:-2px;
      width:100%;
    }

    .heroRight .mini{
      background:rgba(255,255,255,.08) !important;
      flex-shrink:0;
    }

    .sectionTitleWrap{
      margin:26px 0 12px;
      display:flex;
      flex-wrap:wrap;
      align-items:end;
      justify-content:space-between;
      gap:12px;
    }

    .sectionTitle{
      margin:0;
      font-size:28px;
      letter-spacing:-.3px;
    }

    .sectionText{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      max-width:720px;
    }

    .trustRow{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .trustCard{
      padding:18px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.87));
      border:1px solid rgba(8,38,58,.08);
      box-shadow:0 10px 24px rgba(8,38,58,.06);
    }

    .trustIcon{
      width:44px;
      height:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      background:rgba(14,165,233,.10);
      color:#0b4d6f;
      margin-bottom:10px;
      font-weight:850;
    }

    .trustTitle{
      font-weight:850;
      margin-bottom:6px;
      display:block;
    }

    .trustText{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      margin:0;
    }

    .bookingOptions{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .optionCard{
      padding:20px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88));
      border:1px solid rgba(8,38,58,.08);
      box-shadow:var(--shadowSoft);
      position:relative;
      overflow:hidden;
    }

    .optionCard.featured{
      border-color:rgba(14,165,233,.24);
      box-shadow:0 18px 36px rgba(14,165,233,.14);
    }

    .optionRibbon{
      position:absolute;
      top:14px;
      right:14px;
      padding:7px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:850;
      color:#7a5600;
      background:rgba(245,158,11,.16);
      border:1px solid rgba(245,158,11,.22);
    }

    .optionHeader{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .optionIcon{
      width:42px;
      height:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:850;
    }

    .optionAirbnb{
      background:rgba(255,56,92,.12);
      color:var(--airbnb);
    }

    .optionBooking{
      background:rgba(0,53,128,.10);
      color:var(--booking);
    }

    .optionDirect{
      background:rgba(14,165,233,.10);
      color:var(--accentDark);
    }

    .optionTitle{
      margin:0;
      font-size:18px;
      font-weight:850;
    }

    .optionSubtitle{
      margin:2px 0 0;
      font-size:13px;
      color:var(--muted);
      line-height:1.55;
    }

    .optionList{
      margin:0 0 16px;
      padding-left:18px;
      color:var(--muted);
      line-height:1.8;
    }

    .optionList li{margin-bottom:2px;}

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .mini{
      padding:18px;
    }

    .mini b{
      display:block;

      height:auto;

    .lightboxBtn{

      border:none;
      width:52px;
      height:52px;
      border-radius:999px;
      cursor:pointer;
      background:rgba(255,255,255,.16);
      color:#fff;
      font-size:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(6px);
      transition:background .15s ease, transform .08s ease;
    }

    .lightboxBtn:hover{
      background:rgba(255,255,255,.24);
    }

    .lightboxBtn:active{
      transform:scale(.97);
    }

    .lightboxClose{
      top:-12px;
      right:-12px;
    }

    .lightboxPrev{
      left:12px;
      top:50%;
      transform:translateY(-50%);
    }

    .lightboxNext{
      right:12px;
      top:50%;
      transform:translateY(-50%);
    }

    .lightboxPrev:active,
    .lightboxNext:active{
      transform:translateY(-50%) scale(.97);
    }

    .lightboxCaption{

      left:50%;
      bottom:-52px;
      transform:translateX(-50%);

      background:rgba(255,255,255,.12);

      border-radius:999px;

    function syncLogoWidthToTwoButtons() {
      const logo = document.querySelector(".brand .logo");
      const infoBtn = document.querySelector('a[data-i18n="nav_info"]');
      const contactBtn = document.querySelector('a[data-i18n="nav_contact"]');

      if (!logo || !infoBtn || !contactBtn) return;

      let gap = 10;
      const parent = infoBtn.parentElement;
      if (parent) {
        const cs = getComputedStyle(parent);
        const g = cs.columnGap || cs.gap || "0";
        gap = parseFloat(g) || 0;
      }

      const w =
        infoBtn.getBoundingClientRect().width +
        contactBtn.getBoundingClientRect().width +
        gap;

      const w2 = w * 2;
      const clamped = Math.max(440, Math.min(Math.round(w2), 1040));
      logo.style.width = clamped + "px";
    }

    function scheduleLogoSync() {
      requestAnimationFrame(syncLogoWidthToTwoButtons);

    function setUrlLangParam(lang) {
      const url = new URL(window.location.href);
      url.searchParams.set("lang", lang);
      window.history.replaceState({}, "", url.toString());
    }

    function lightboxIsOpen() {
      return lightbox.classList.contains("open");
    }

    function beachLightboxIsOpen() {
      return beachLightbox && beachLightbox.classList.contains("open");
    }

    function createDots() {
      galleryDots.innerHTML = "";
      dotButtons = galleryImages.map((img, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "galleryDot";
        btn.setAttribute("aria-label", `Image ${index + 1}`);
        btn.addEventListener("click", () => {
          setFeatured(index, true);
        });
        galleryDots.appendChild(btn);
        return btn;
      });
    }

    function updateLightboxContent(index) {
      const img = galleryImages[index];
      if (!img) return;

      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt || "";
      lightboxCaption.textContent = "Spitaki Milos";
    }

    function setFeatured(index, shouldScrollThumb = false) {
      if (!galleryImages.length) return;

      currentGalleryIndex = index;
      const img = galleryImages[index];

      featuredImage.src = img.src;
      featuredImage.alt = img.alt || "";
      featuredCaption.textContent = "Spitaki Milos";
      galleryCounter.textContent = `${index + 1} / ${galleryImages.length}`;

      thumbButtons.forEach((btn, btnIndex) => {
        btn.classList.toggle("active", btnIndex === index);
      });

      dotButtons.forEach((btn, btnIndex) => {
        btn.classList.toggle("active", btnIndex === index);
      });

      if (shouldScrollThumb && thumbButtons[index]) {
        thumbButtons[index].scrollIntoView({
          behavior: "smooth",
          inline: "center",
          block: "nearest"
        });
      }

      if (lightboxIsOpen()) {
        updateLightboxContent(index);
      }
    }

    function openLightbox(index = currentGalleryIndex) {
      currentGalleryIndex = index;
      updateLightboxContent(currentGalleryIndex);
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightboxModal() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      if (!beachLightboxIsOpen()) {
        document.body.style.overflow = "";
      }
    }

    function showPrevImage() {
      if (!galleryImages.length) return;
      const nextIndex = (currentGalleryIndex - 1 + galleryImages.length) % galleryImages.length;
      setFeatured(nextIndex, true);
    }

    function showNextImage() {
      if (!galleryImages.length) return;
      const nextIndex = (currentGalleryIndex + 1) % galleryImages.length;
      setFeatured(nextIndex, true);
    }

    function initGallery() {
      thumbButtons = Array.from(document.querySelectorAll(".thumbBtn"));
      galleryImages = thumbButtons.map((btn) => btn.querySelector("img"));

      thumbButtons.forEach((btn, index) => {
        btn.addEventListener("click", () => {
          setFeatured(index, true);
        });
      });

      createDots();
      setFeatured(0);
    }

    function getBeachLangValue(item, key) {
      const langKey = currentLang === "en" ? `${key}En` : `${key}El`;
      return item[langKey] || item[`${key}El`] || "";
    }

    function updateBeachLightboxContent(index) {
      const item = beachGalleryItems[index];
      if (!item || !beachLightboxImg || !beachLightboxCaption) return;

      const title = getBeachLangValue(item, "title");
      const caption = getBeachLangValue(item, "caption");

      beachLightboxImg.src = item.src;
      beachLightboxImg.alt = title;
      beachLightboxCaption.textContent = caption ? `${title} — ${caption}` : title;
    }

    function openBeachLightbox(index = 0) {
      if (!beachGalleryItems.length || !beachLightbox) return;

      beachGalleryIndex = index;
      updateBeachLightboxContent(beachGalleryIndex);

      beachLightbox.classList.add("open");
      beachLightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeBeachLightboxModal() {
      if (!beachLightbox) return;

      beachLightbox.classList.remove("open");
      beachLightbox.setAttribute("aria-hidden", "true");

      if (!lightboxIsOpen()) {
        document.body.style.overflow = "";
      }
    }

    function showPrevBeachImage() {
      if (!beachGalleryItems.length) return;
      beachGalleryIndex = (beachGalleryIndex - 1 + beachGalleryItems.length) % beachGalleryItems.length;
      updateBeachLightboxContent(beachGalleryIndex);
    }

    function showNextBeachImage() {
      if (!beachGalleryItems.length) return;
      beachGalleryIndex = (beachGalleryIndex + 1) % beachGalleryItems.length;
      updateBeachLightboxContent(beachGalleryIndex);
    }

    function initBeachGallery() {
      const beachCards = Array.from(document.querySelectorAll(".beachCard"));

      beachGalleryItems = beachCards.map((card) => ({
        src: card.getAttribute("data-beach-src"),
        titleEl: card.getAttribute("data-title-el") || "",
        titleEn: card.getAttribute("data-title-en") || "",
        captionEl: card.getAttribute("data-caption-el") || "",
        captionEn: card.getAttribute("data-caption-en") || ""
      }));

      beachCards.forEach((card, index) => {
        card.addEventListener("click", () => {
          openBeachLightbox(index);
        });
      });

      if (beachLightboxClose) {
        beachLightboxClose.addEventListener("click", closeBeachLightboxModal);
      }

      if (beachLightboxPrev) {
        beachLightboxPrev.addEventListener("click", showPrevBeachImage);
      }

      if (beachLightboxNext) {
        beachLightboxNext.addEventListener("click", showNextBeachImage);
      }

      if (beachLightbox) {
        beachLightbox.addEventListener("click", (e) => {
          if (e.target === beachLightbox) {
            closeBeachLightboxModal();
          }
        });
      }

      if (beachLightboxInner) {
        addSwipeSupport(beachLightboxInner, () => {
          showNextBeachImage();
        }, () => {
          showPrevBeachImage();
        });
      }

      document.addEventListener("keydown", (e) => {
        if (!beachLightboxIsOpen()) return;

        if (e.key === "Escape" || e.key === "ArrowLeft" || e.key === "ArrowRight") {
          e.preventDefault();
          e.stopImmediatePropagation();

          if (e.key === "Escape") closeBeachLightboxModal();
          if (e.key === "ArrowLeft") showPrevBeachImage();
          if (e.key === "ArrowRight") showNextBeachImage();
        }
      }, true);
    }

    function initFaq() {
      const items = document.querySelectorAll(".faqItem");
      items.forEach((item) => {
        const btn = item.querySelector(".faqBtn");
        btn.addEventListener("click", () => {
          item.classList.toggle("open");
        });
      });
    }

    function applyTranslations(lang) {
      const tr = T[lang];

      document.getElementById("htmlRoot").setAttribute("lang", lang);
      document.title = tr.meta_title;

      const metaTitle = document.getElementById("metaTitle");
      if (metaTitle) metaTitle.textContent = tr.meta_title;

      const metaDesc = document.getElementById("metaDesc");
      if (metaDesc) metaDesc.setAttribute("content", tr.meta_desc);

      const ogTitle = document.getElementById("ogTitle");
      if (ogTitle) ogTitle.setAttribute("content", tr.og_title);

      const ogDesc = document.getElementById("ogDesc");
      if (ogDesc) ogDesc.setAttribute("content", tr.og_desc);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        const val = tr[key];
        if (typeof val === "undefined") return;

        const isHtml = el.getAttribute("data-i18n-html") === "true";
        if (isHtml) el.innerHTML = val;
        else el.textContent = val;
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
        const key = el.getAttribute("data-i18n-placeholder");
        const val = tr[key];
        if (typeof val === "undefined") return;
        el.setAttribute("placeholder", val);
      });

      document.querySelectorAll("[data-i18n-alt]").forEach((el) => {
        const key = el.getAttribute("data-i18n-alt");
        const val = tr[key];
        if (typeof val === "undefined") return;
        el.setAttribute("alt", val);
      });

      const btnEL = document.getElementById("btnEL");
      const btnEN = document.getElementById("btnEN");
      btnEL.classList.toggle("active", lang === "el");
      btnEN.classList.toggle("active", lang === "en");

      createDots();
      setFeatured(currentGalleryIndex);

      if (beachLightboxIsOpen()) {
        updateBeachLightboxContent(beachGalleryIndex);
      }

      syncLogoSync();
    }

    function setLang(lang) {
      if (!T[lang]) return;
      currentLang = lang;
      localStorage.setItem("site_lang", lang);
      setUrlLangParam(lang);
      applyTranslations(lang);
      updateWhatsAppLink();
    }

    function buildMessage() {
      const tr = T[currentLang];
      const f = document.getElementById("inquiryForm");
      const name = f.name.value.trim();
      const phone = f.phone.value.trim();
      const email = f.email.value.trim();
      const guests = f.guests.value;
      const checkin = f.checkin.value;
      const checkout = f.checkout.value;
      const msg = f.message.value.trim();

      const lines = [
        tr.email_greeting,
        "",
        tr.email_intro,
        `• ${tr.email_name}: ${name}`,
        `• ${tr.email_email}: ${email}`,
        phone ? `• ${tr.email_phone}: ${phone}` : null,
        `• ${tr.email_guests}: ${guests}`,
        `• ${tr.email_checkin}: ${checkin}`,
        `• ${tr.email_checkout}: ${checkout}`,
        msg ? "" : null,
        msg ? `${tr.email_message}:` : null,
        msg ? msg : null,
        "",
        tr.email_thanks
      ].filter(Boolean);

      return lines.join("\n");
    }

    function composeEmail(e) {
      e.preventDefault();
      const tr = T[currentLang];

      const f = document.getElementById("inquiryForm");
      const checkin = f.checkin.value;
      const checkout = f.checkout.value;

      if (checkin && checkout && checkout <= checkin) {
        alert(tr.alert_dates);
        return false;
      }

      const subject = tr.email_subject;
      const body = buildMessage();
      const mailto = `mailto:${DEST_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
      return false;
    }

    function updateWhatsAppLink() {
      const f = document.getElementById("inquiryForm");
      if (!f) return;
      const body = buildMessage();
      const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(body)}`;
      const waBtn = document.getElementById("waBtn");
      if (waBtn) waBtn.href = url;
    }

    function addSwipeSupport(element, onSwipeLeft, onSwipeRight) {
      let startX = 0;
      let startY = 0;
      let endX = 0;
      let endY = 0;

      element.addEventListener("touchstart", (e) => {
        const t = e.changedTouches[0];
        startX = t.clientX;
        startY = t.clientY;
        endX = t.clientX;
        endY = t.clientY;
      }, { passive: true });

      element.addEventListener("touchmove", (e) => {
        const t = e.changedTouches[0];
        endX = t.clientX;
        endY = t.clientY;
      }, { passive: true });

      element.addEventListener("touchend", () => {
        const diffX = endX - startX;
        const diffY = endY - startY;

        if (Math.abs(diffX) > 45 && Math.abs(diffX) > Math.abs(diffY)) {
          suppressFeaturedClick = true;
          setTimeout(() => { suppressFeaturedClick = false; }, 320);

          if (diffX < 0) onSwipeLeft();
          else onSwipeRight();
        }
      }, { passive: true });
    }

    document.addEventListener("input", (e) => {
      if (e.target && e.target.closest("#inquiryForm")) updateWhatsAppLink();
    });

    featuredPrev.addEventListener("click", (e) => {
      e.stopPropagation();
      showPrevImage();
    });

    featuredNext.addEventListener("click", (e) => {
      e.stopPropagation();
      showNextImage();
    });

    featuredBtn.addEventListener("click", () => {
      if (suppressFeaturedClick) return;
      openLightbox(currentGalleryIndex);
    });

    lightboxClose.addEventListener("click", closeLightboxModal);
    lightboxPrev.addEventListener("click", () => {
      showPrevImage();
      updateLightboxContent(currentGalleryIndex);
    });
    lightboxNext.addEventListener("click", () => {
      showNextImage();
      updateLightboxContent(currentGalleryIndex);
    });

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) {
        closeLightboxModal();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (lightboxIsOpen()) {
        if (e.key === "Escape") {
          closeLightboxModal();
        } else if (e.key === "ArrowLeft") {
          showPrevImage();
          updateLightboxContent(currentGalleryIndex);
        } else if (e.key === "ArrowRight") {
          showNextImage();
          updateLightboxContent(currentGalleryIndex);
        }
        return;
      }

      if (e.key === "ArrowLeft") {
        showPrevImage();
      } else if (e.key === "ArrowRight") {
        showNextImage();
      }
    });

    addSwipeSupport(featuredStage, () => {
      showNextImage();
    }, () => {
      showPrevImage();
    });

    addSwipeSupport(lightboxInner, () => {
      showNextImage();
      updateLightboxContent(currentGalleryIndex);
    }, () => {
      showPrevImage();
      updateLightboxContent(currentGalleryIndex);
    });

    document.getElementById("btnEL").addEventListener("click", () => setLang("el"));
    document.getElementById("btnEN").addEventListener("click", () => setLang("en"));

    window.addEventListener("resize", syncLogoSync);

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(syncLogoSync);
    }

    initGallery();
    initFaq();
    initBeachGallery();
    setLang(getInitialLang());
    syncLogoSync();
    updateWhatsAppLink();
  </script>
</body>
</html>
