<!doctype html>
<html lang="el" id="htmlRoot">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title id="metaTitle">Spitaki Milos | Διαμονή στη Μήλο</title>
  <meta id="metaDesc" name="description" content="Spitaki Milos – ιδιωτική διαμονή στην Τρυπητή Μήλου με βεράντες και θέα στη θάλασσα. Κράτηση μέσω Airbnb ή Booking.com, ή άμεσο αίτημα διαθεσιμότητας." />
  <link id="canonicalLink" rel="canonical" href="https://spitakimilos.com/" />

  <link rel="alternate" hreflang="el" href="https://spitakimilos.com/?lang=el" />
  <link rel="alternate" hreflang="en" href="https://spitakimilos.com/?lang=en" />
  <link rel="alternate" hreflang="x-default" href="https://spitakimilos.com/" />

  <meta id="ogTitle" property="og:title" content="Spitaki Milos | Διαμονή στη Μήλο" />
  <meta id="ogDesc" property="og:description" content="Τρυπητή Μήλου • Βεράντες με θέα στη θάλασσα • Κράτηση μέσω Airbnb ή Booking.com" />
  <meta property="og:type" content="website" />
  <meta id="ogUrl" property="og:url" content="https://spitakimilos.com/" />

  <style>
    :root{
      --bgTop:#c9edff;
      --bgMid:#f7fcff;
      --bgBottom:#ffefcf;

      --text:#08263a;
      --muted:#2f5c73;
      --muted2:#52778c;

      --accent:#0ea5e9;
      --accent2:#fb7185;
      --accent3:#f59e0b;
      --accentDark:#0a7aac;

      --airbnb:#FF385C;
      --booking:#003580;
      --success:#10b981;
      --gold:#b88b1e;

      --white:rgba(255,255,255,.96);
      --glass:rgba(255,255,255,.76);
      --card:rgba(255,255,255,.92);
      --cardSoft:rgba(255,255,255,.86);

      --border:rgba(8,38,58,.10);
      --shadow:0 20px 60px rgba(8,38,58,.16);
      --shadowSoft:0 12px 32px rgba(8,38,58,.08);
      --radius:26px;
    }

    *{box-sizing:border-box}
    html{
      scroll-behavior:smooth;
      width:100%;
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 520px at 10% 0%, rgba(14,165,233,.38), transparent 62%),
        radial-gradient(900px 500px at 90% 8%, rgba(251,113,133,.18), transparent 62%),
        radial-gradient(900px 460px at 65% 100%, rgba(245,158,11,.18), transparent 60%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 38%, var(--bgBottom) 100%);
    }

    img{max-width:100%;display:block}
    a{color:inherit;text-decoration:none}

    .wrap{
      max-width:1200px;
      width:min(1200px, calc(100% - 24px));
      margin:0 auto;
      padding:18px 12px 128px;
    }

    .glassBar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:14px;
      padding:14px 16px;
      margin-bottom:18px;
      border:1px solid var(--border);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.66));
      backdrop-filter:blur(14px) saturate(120%);
      box-shadow:0 10px 28px rgba(8,38,58,.08);
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .brand .logo{
      height:clamp(130px, 11vw, 205px);
      width:660px;
      max-width:100%;
      object-fit:contain;
      filter:drop-shadow(0 3px 12px rgba(8,38,58,.16));
    }

    .brandSub{
      color:var(--muted);
      font-size:13px;
      font-weight:600;
    }

    .topActions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:46px;
      padding:12px 15px;
      border-radius:15px;
      border:1px solid transparent;
      font-weight:780;
      line-height:1.2;
      cursor:pointer;
      transition:transform .08s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
      user-select:none;
    }

    .btn:active{transform:translateY(1px)}

    .btn.primary{
      color:#fff;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow:0 12px 24px rgba(14,165,233,.24);
    }
    .btn.primary:hover{
      box-shadow:0 16px 30px rgba(14,165,233,.30);
    }

    .btn.ghost{
      background:rgba(255,255,255,.84);
      border-color:var(--border);
      color:var(--text);
    }
    .btn.ghost:hover{
      background:rgba(255,255,255,.96);
      box-shadow:0 10px 22px rgba(8,38,58,.08);
    }

    .btn.full{width:100%}

    .langSwitch{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .langBtn{
      min-height:auto;
      padding:10px 12px;
      border-radius:999px;
      font-weight:800;
      letter-spacing:.4px;
    }

    .langBtn.active{
      background:rgba(14,165,233,.18);
      border-color:rgba(14,165,233,.34);
    }

    .panel{
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:linear-gradient(180deg, var(--card), var(--cardSoft));
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px) saturate(120%);
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(0,1.15fr) minmax(330px,.85fr);
      gap:18px;
      align-items:stretch;
      margin-bottom:18px;
    }

    .heroLeft{
      padding:30px;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(480px 220px at 0% 0%, rgba(14,165,233,.12), transparent 70%),
        radial-gradient(480px 220px at 100% 100%, rgba(251,113,133,.09), transparent 70%),
        linear-gradient(180deg, rgba(255,255,255,.97), rgba(255,255,255,.88));
    }

    .heroKicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      border:1px solid rgba(8,38,58,.08);
      box-shadow:0 8px 18px rgba(8,38,58,.05);
      font-size:12px;
      font-weight:820;
      margin-bottom:14px;
    }

    .heroDot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--success);
      box-shadow:0 0 0 6px rgba(16,185,129,.12);
    }

    .heroLeft h1{
      margin:0 0 12px;
      font-size:48px;
      line-height:1.02;
      letter-spacing:-.55px;
      max-width:760px;
    }

    .heroLead{
      margin:0;
      max-width:770px;
      font-size:17px;
      line-height:1.84;
      color:var(--muted);
    }

    .heroChips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .heroChip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(14,165,233,.10);
      border:1px solid rgba(14,165,233,.14);
      color:#0b4d6f;
      font-size:13px;
      font-weight:720;
    }

    .heroStats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:18px;
    }

    .heroStat{
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(8,38,58,.07);
      box-shadow:0 10px 20px rgba(8,38,58,.05);
    }

    .heroStatLabel{
      display:block;
      margin-bottom:4px;
      color:var(--muted2);
      font-size:12px;
      font-weight:650;
    }

    .heroStatValue{
      display:block;
      font-size:16px;
      font-weight:850;
    }

    .heroRight{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.88));
    }

    .bookingCard{
      padding:18px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.92));
      border:1px solid rgba(8,38,58,.08);
      box-shadow:var(--shadowSoft);
    }

    .bookingTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .bookingTitle{
      margin:0;
      font-size:20px;
      font-weight:860;
    }

    .bookingSub{
      margin:6px 0 0;
      color:var(--muted);
      line-height:1.65;
      font-size:14px;
    }

    .miniBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(16,185,129,.10);
      border:1px solid rgba(16,185,129,.18);
      color:#0c6d4c;
      font-size:12px;
      font-weight:840;
      white-space:nowrap;
    }

    .ctaStack{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .ctaRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .marketBtn{
      background:rgba(255,255,255,.98);
      border-color:rgba(8,38,58,.11);
      box-shadow:0 10px 22px rgba(8,38,58,.08);
      font-weight:840;
    }

    .marketBtn:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 26px rgba(8,38,58,.11);
    }

    .airbnbBtn{border-color:rgba(255,56,92,.28)}
    .airbnbBtn:hover{border-color:rgba(255,56,92,.46)}

    .bookingBtn{border-color:rgba(0,53,128,.22)}
    .bookingBtn:hover{border-color:rgba(0,53,128,.40)}

    .brandMark{
      width:22px;
      height:22px;
      min-width:22px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 10px rgba(8,38,58,.10);
    }

    .brandMark svg{
      width:14px;
      height:14px;
      display:block;
    }

    .airbnbMark{
      background:rgba(255,56,92,.14);
      color:var(--airbnb);
    }

    .bookingMark{
      background:rgba(0,53,128,.10);
      color:var(--booking);
      font-size:12px;
      font-weight:850;
      letter-spacing:.2px;
    }

    .bookingMeta{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:12px;
    }

    .bookingMetaCard{
      padding:12px;
      border-radius:18px;
      background:rgba(14,165,233,.06);
      border:1px solid rgba(14,165,233,.10);
    }

    .bookingMetaLabel{
      display:block;
      font-size:12px;
      color:var(--muted2);
      margin-bottom:4px;
    }

    .bookingMetaValue{
      font-size:15px;
      font-weight:840;
    }

    .microTrust{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .microTrustItem{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:13px 14px;
      border-radius:18px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(8,38,58,.07);
    }

    .microTrustIcon{
      width:36px;
      height:36px;
      min-width:36px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(14,165,233,.10);
      color:#0a597d;
      font-weight:850;
    }

    .microTrustText{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:13px;
    }

    .gallerySection{
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:18px;
      margin-bottom:18px;
    }

    .galleryWrap{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow:hidden;
    }

    .featuredStage{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(8,38,58,.14);
      box-shadow:0 12px 28px rgba(8,38,58,.10);
      width:100%;
    }

    .featuredBtn{
      display:block;
      width:100%;
      border:none;
      padding:0;
      background:transparent;
      cursor:zoom-in;
    }

    .featuredBtn img{
      width:100%;
      height:470px;
      object-fit:cover;
      transition:transform .3s ease, filter .3s ease;
    }

    .featuredStage:hover .featuredBtn img{
      transform:scale(1.015);
      filter:saturate(1.03);
    }

    .featuredBtn:focus-visible{outline:none}

    .featuredStage:has(.featuredBtn:focus-visible){
      box-shadow:
        0 0 0 4px rgba(14,165,233,.18),
        0 16px 32px rgba(8,38,58,.14);
    }

    .featuredOverlay{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .galleryTopBar,
    .galleryBottomBar{
      position:absolute;
      left:12px;
      right:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      max-width:calc(100% - 24px);
    }

    .galleryTopBar{top:12px}
    .galleryBottomBar{bottom:12px;align-items:end}

    .galleryPill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(8,38,58,.58);
      color:#fff;
      font-size:12px;
      font-weight:760;
      backdrop-filter:blur(8px);
      box-shadow:0 8px 20px rgba(0,0,0,.10);
    }

    .featuredNav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:2;
      border:none;
      width:48px;
      height:48px;
      border-radius:999px;
      cursor:pointer;
      background:rgba(255,255,255,.24);
      color:#fff;
      font-size:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(8px);
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      transition:background .16s ease, transform .08s ease;
    }

    .featuredNav:hover{background:rgba(255,255,255,.32)}
    .featuredNav:active{transform:translateY(-50%) scale(.97)}
    .featuredPrev{left:12px}
    .featuredNext{right:12px}

    .galleryDots{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      padding:2px 0 4px;
    }

    .galleryDot{
      width:9px;
      height:9px;
      border:none;
      border-radius:999px;
      background:rgba(8,38,58,.18);
      cursor:pointer;
      transition:transform .16s ease, background .16s ease, width .16s ease;
    }

    .galleryDot:hover{background:rgba(14,165,233,.55)}
    .galleryDot.active{
      width:22px;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .galleryDot:focus-visible{
      outline:none;
      box-shadow:0 0 0 4px rgba(14,165,233,.18);
    }

    .featuredCaption{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      min-height:20px;
      text-align:center;
      margin-top:-2px;
    }

    .thumbRail{
      display:flex;
      gap:10px;
      overflow-x:auto;
      overflow-y:hidden;
      padding:4px 2px 8px;
      scroll-snap-type:x proximity;
      -webkit-overflow-scrolling:touch;
    }

    .thumbRail::-webkit-scrollbar{height:8px}
    .thumbRail::-webkit-scrollbar-track{
      background:rgba(8,38,58,.06);
      border-radius:999px;
    }
    .thumbRail::-webkit-scrollbar-thumb{
      background:rgba(14,165,233,.40);
      border-radius:999px;
    }

    .thumbBtn{
      flex:0 0 auto;
      width:112px;
      border:none;
      background:transparent;
      padding:0;
      border-radius:16px;
      cursor:pointer;
      scroll-snap-align:start;
    }

    .thumbBtn img{
      width:112px;
      height:84px;
      object-fit:cover;
      border-radius:16px;
      border:2px solid transparent;
      box-shadow:0 8px 18px rgba(8,38,58,.08);
      background:#fff;
      transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease, opacity .16s ease;
      opacity:.92;
    }

    .thumbBtn:hover img{
      transform:translateY(-2px);
      opacity:1;
    }

    .thumbBtn.active img{
      border-color:var(--accent);
      opacity:1;
      box-shadow:0 0 0 4px rgba(14,165,233,.16), 0 12px 22px rgba(8,38,58,.12);
    }

    .thumbBtn:focus-visible{outline:none}
    .thumbBtn:focus-visible img{
      border-color:var(--accent2);
      box-shadow:0 0 0 4px rgba(251,113,133,.18), 0 12px 22px rgba(8,38,58,.12);
      opacity:1;
    }

    .galleryHint{
      text-align:center;
      color:rgba(8,38,58,.58);
      font-size:12px;
      margin-top:-2px;
    }

    .sectionHead{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:end;
      gap:12px;
      margin:28px 0 12px;
    }

    .sectionTitle{
      margin:0;
      font-size:30px;
      line-height:1.1;
      letter-spacing:-.35px;
    }

    .sectionText{
      margin:0;
      color:var(--muted);
      line-height:1.74;
      max-width:760px;
    }

    .highlightsGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .highlightCard{
      padding:18px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.87));
      border:1px solid rgba(8,38,58,.08);
      box-shadow:var(--shadowSoft);
    }

    .highlightIcon{
      width:44px;
      height:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(14,165,233,.10);
      color:#0b4d6f;
      font-size:18px;
      font-weight:840;
      margin-bottom:10px;
    }

    .highlightTitle{
      display:block;
      margin-bottom:6px;
      font-weight:850;
    }

    .highlightText{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.72;
    }

    .optionsGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .optionCard{
      position:relative;
      overflow:hidden;
      padding:20px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88));
      border:1px solid rgba(8,38,58,.08);
      box-shadow:var(--shadowSoft);
    }

    .optionCard.featured{
      border-color:rgba(14,165,233,.24);
      box-shadow:0 18px 36px rgba(14,165,233,.14);
    }

    .optionRibbon{
      position:absolute;
      top:14px;
      right:14px;
      padding:7px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:850;
      color:#7a5600;
      background:rgba(245,158,11,.16);
      border:1px solid rgba(245,158,11,.22);
    }

    .optionHeader{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .optionIcon{
      width:44px;
      height:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:850;
      font-size:16px;
    }

    .optionAirbnb{background:rgba(255,56,92,.12);color:var(--airbnb)}
    .optionBooking{background:rgba(0,53,128,.10);color:var(--booking)}
    .optionDirect{background:rgba(14,165,233,.10);color:var(--accentDark)}

    .optionTitle{
      margin:0;
      font-size:18px;
      font-weight:860;
    }

    .optionSubtitle{
      margin:2px 0 0;
      font-size:13px;
      color:var(--muted);
      line-height:1.55;
    }

    .optionList{
      margin:0 0 16px;
      padding-left:18px;
      color:var(--muted);
      line-height:1.85;
    }

    .detailsGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-bottom:18px;
    }

    .detailsCard{
      padding:18px;
    }

    .detailsCard b{
      display:block;
      margin-bottom:8px;
      font-weight:850;
    }

    .detailsText{
      margin:0;
      color:var(--muted);
      line-height:1.8;
    }

    .list{
      margin:0;
      padding-left:18px;
      color:var(--muted);
      line-height:1.86;
    }

    .faqWrap{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-bottom:18px;
    }

    .faqItem{
      background:linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.88));
      border:1px solid rgba(8,38,58,.08);
      border-radius:20px;
      box-shadow:0 10px 24px rgba(8,38,58,.05);
      overflow:hidden;
    }

    .faqBtn{
      width:100%;
      border:none;
      background:transparent;
      padding:16px 18px;
      text-align:left;
      display:flex;
      align-items:center;

    function syncLogoWidth() {
      const logo = document.querySelector(".brand .logo");
      const infoBtn = document.querySelector('a[data-i18n="nav_info"]');
      const contactBtn = document.querySelector('a[data-i18n="nav_contact"]');
      if (!logo || !infoBtn || !contactBtn) return;

      let gap = 10;
      const parent = infoBtn.parentElement;
      if (parent) {
        const cs = getComputedStyle(parent);
        const g = cs.columnGap || cs.gap || "0";
        gap = parseFloat(g) || 0;
      }

      const w = infoBtn.getBoundingClientRect().width + contactBtn.getBoundingClientRect().width + gap;
      const target = Math.max(440, Math.min(Math.round(w * 2), 1040));
      logo.style.width = target + "px";
    }

      requestAnimationFrame(syncLogoWidth);

    let currentLang = "el";
    let thumbButtons = [];
    let galleryImages = [];
    let dotButtons = [];
    let currentGalleryIndex = 0;
    let suppressFeaturedClick = false;

    const featuredStage = document.getElementById("featuredStage");
    const featuredBtn = document.getElementById("featuredBtn");
    const featuredImage = document.getElementById("featuredImage");
    const featuredCaption = document.getElementById("featuredCaption");
    const featuredPrev = document.getElementById("featuredPrev");
    const featuredNext = document.getElementById("featuredNext");
    const galleryCounter = document.getElementById("galleryCounter");
    const galleryDots = document.getElementById("galleryDots");

    const lightbox = document.getElementById("lightbox");
    const lightboxInner = document.getElementById("lightboxInner");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxCaption = document.getElementById("lightboxCaption");
    const lightboxClose = document.getElementById("lightboxClose");
    const lightboxPrev = document.getElementById("lightboxPrev");
    const lightboxNext = document.getElementById("lightboxNext");

    function getInitialLang() {
      const urlLang = new URLSearchParams(window.location.search).get("lang");
      if (urlLang && T[urlLang]) return urlLang;

      const saved = localStorage.getItem("site_lang");
      if (saved && T[saved]) return saved;

      const nav = (navigator.language || "").toLowerCase();
      if (nav.startsWith("en")) return "en";
      return "el";
    }

    function setUrlLangParam(lang) {
      const url = new URL(window.location.href);
      url.searchParams.set("lang", lang);
      window.history.replaceState({}, "", url.toString());
    }

    function lightboxIsOpen() {
      return lightbox.classList.contains("open");
    }

    function createDots() {
      galleryDots.innerHTML = "";
      dotButtons = galleryImages.map((img, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "galleryDot";
        btn.setAttribute("aria-label", `Image ${index + 1}`);
        btn.addEventListener("click", () => setFeatured(index, true));
        galleryDots.appendChild(btn);
        return btn;
      });
    }

    function updateLightboxContent(index) {
      const img = galleryImages[index];
      if (!img) return;
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt || "";
      lightboxCaption.textContent = "Spitaki Milos";
    }

    function setFeatured(index, shouldScrollThumb = false) {
      if (!galleryImages.length) return;

      currentGalleryIndex = index;
      const img = galleryImages[index];

      featuredImage.src = img.src;
      featuredImage.alt = img.alt || "";
      featuredCaption.textContent = "Spitaki Milos";
      galleryCounter.textContent = `${index + 1} / ${galleryImages.length}`;

      thumbButtons.forEach((btn, i) => btn.classList.toggle("active", i === index));
      dotButtons.forEach((btn, i) => btn.classList.toggle("active", i === index));

      if (shouldScrollThumb && thumbButtons[index]) {
        thumbButtons[index].scrollIntoView({
          behavior: "smooth",
          inline: "center",
          block: "nearest"
        });
      }

      if (lightboxIsOpen()) updateLightboxContent(index);
    }

    function openLightbox(index = currentGalleryIndex) {
      currentGalleryIndex = index;
      updateLightboxContent(currentGalleryIndex);
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightboxModal() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function showPrevImage() {
      if (!galleryImages.length) return;
      const nextIndex = (currentGalleryIndex - 1 + galleryImages.length) % galleryImages.length;
      setFeatured(nextIndex, true);
    }

    function showNextImage() {
      if (!galleryImages.length) return;
      const nextIndex = (currentGalleryIndex + 1) % galleryImages.length;
      setFeatured(nextIndex, true);
    }

    function initGallery() {
      thumbButtons = Array.from(document.querySelectorAll(".thumbBtn"));
      galleryImages = thumbButtons.map((btn) => btn.querySelector("img"));

      thumbButtons.forEach((btn, index) => {
        btn.addEventListener("click", () => setFeatured(index, true));
      });

      createDots();
      setFeatured(0);
    }

    function initFaq() {
      document.querySelectorAll(".faqItem").forEach((item) => {
        const btn = item.querySelector(".faqBtn");
        btn.addEventListener("click", () => {
          item.classList.toggle("open");
        });
      });
    }

    function applyTranslations(lang) {
      const tr = T[lang];
      document.getElementById("htmlRoot").setAttribute("lang", lang);
      document.title = tr.meta_title;

      const metaTitle = document.getElementById("metaTitle");
      if (metaTitle) metaTitle.textContent = tr.meta_title;

      const metaDesc = document.getElementById("metaDesc");
      if (metaDesc) metaDesc.setAttribute("content", tr.meta_desc);

      const ogTitle = document.getElementById("ogTitle");
      if (ogTitle) ogTitle.setAttribute("content", tr.og_title);

      const ogDesc = document.getElementById("ogDesc");
      if (ogDesc) ogDesc.setAttribute("content", tr.og_desc);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        const val = tr[key];
        if (typeof val === "undefined") return;

        const isHtml = el.getAttribute("data-i18n-html") === "true";
        if (isHtml) el.innerHTML = val;
        else el.textContent = val;
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
        const key = el.getAttribute("data-i18n-placeholder");
        const val = tr[key];
        if (typeof val === "undefined") return;
        el.setAttribute("placeholder", val);
      });

      document.querySelectorAll("[data-i18n-alt]").forEach((el) => {
        const key = el.getAttribute("data-i18n-alt");
        const val = tr[key];
        if (typeof val === "undefined") return;
        el.setAttribute("alt", val);
      });

      const btnEL = document.getElementById("btnEL");
      const btnEN = document.getElementById("btnEN");
      btnEL.classList.toggle("active", lang === "el");
      btnEN.classList.toggle("active", lang === "en");

      createDots();
      setFeatured(currentGalleryIndex);
      scheduleLogoSync();
    }

    function setLang(lang) {
      if (!T[lang]) return;
      currentLang = lang;
      localStorage.setItem("site_lang", lang);
      setUrlLangParam(lang);
      applyTranslations(lang);
      updateWhatsAppLink();
    }

    function buildMessage() {
      const tr = T[currentLang];
      const f = document.getElementById("inquiryForm");
      const name = f.name.value.trim();
      const phone = f.phone.value.trim();
      const email = f.email.value.trim();
      const guests = f.guests.value;
      const checkin = f.checkin.value;
      const checkout = f.checkout.value;
      const msg = f.message.value.trim();

      const lines = [
        tr.email_greeting,
        "",
        tr.email_intro,
        `• ${tr.email_name}: ${name}`,
        `• ${tr.email_email}: ${email}`,
        phone ? `• ${tr.email_phone}: ${phone}` : null,
        `• ${tr.email_guests}: ${guests}`,
        `• ${tr.email_checkin}: ${checkin}`,
        `• ${tr.email_checkout}: ${checkout}`,
        msg ? "" : null,
        msg ? `${tr.email_message}:` : null,
        msg ? msg : null,
        "",
        tr.email_thanks
      ].filter(Boolean);

      return lines.join("\n");
    }

    function composeEmail(e) {
      e.preventDefault();
      const tr = T[currentLang];
      const f = document.getElementById("inquiryForm");
      const checkin = f.checkin.value;
      const checkout = f.checkout.value;

      if (checkin && checkout && checkout <= checkin) {
        alert(tr.alert_dates);
        return false;
      }

      const subject = tr.email_subject;
      const body = buildMessage();
      const mailto = `mailto:${DEST_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
      return false;
    }

    function updateWhatsAppLink() {
      const f = document.getElementById("inquiryForm");
      if (!f) return;
      const body = buildMessage();
      const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(body)}`;
      const waBtn = document.getElementById("waBtn");
      if (waBtn) waBtn.href = url;
    }

    function addSwipeSupport(element, onSwipeLeft, onSwipeRight) {
      let startX = 0;
      let startY = 0;
      let endX = 0;
      let endY = 0;

      element.addEventListener("touchstart", (e) => {
        const t = e.changedTouches[0];
        startX = t.clientX;
        startY = t.clientY;
        endX = t.clientX;
        endY = t.clientY;
      }, { passive: true });

      element.addEventListener("touchmove", (e) => {
        const t = e.changedTouches[0];
        endX = t.clientX;
        endY = t.clientY;
      }, { passive: true });

      element.addEventListener("touchend", () => {
        const diffX = endX - startX;
        const diffY = endY - startY;

        if (Math.abs(diffX) > 45 && Math.abs(diffX) > Math.abs(diffY)) {
          suppressFeaturedClick = true;
          setTimeout(() => { suppressFeaturedClick = false; }, 320);
          if (diffX < 0) onSwipeLeft();
          else onSwipeRight();
        }
      }, { passive: true });
    }

    document.addEventListener("input", (e) => {
      if (e.target && e.target.closest("#inquiryForm")) updateWhatsAppLink();
    });

    featuredPrev.addEventListener("click", (e) => {
      e.stopPropagation();
      showPrevImage();
    });

    featuredNext.addEventListener("click", (e) => {
      e.stopPropagation();
      showNextImage();
    });

    featuredBtn.addEventListener("click", () => {
      if (suppressFeaturedClick) return;
      openLightbox(currentGalleryIndex);
    });

    lightboxClose.addEventListener("click", closeLightboxModal);
    lightboxPrev.addEventListener("click", () => {
      showPrevImage();
      updateLightboxContent(currentGalleryIndex);
    });
    lightboxNext.addEventListener("click", () => {
      showNextImage();
      updateLightboxContent(currentGalleryIndex);
    });

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightboxModal();
    });

    document.addEventListener("keydown", (e) => {
      if (lightboxIsOpen()) {
        if (e.key === "Escape") closeLightboxModal();
        else if (e.key === "ArrowLeft") {
          showPrevImage();
          updateLightboxContent(currentGalleryIndex);
        } else if (e.key === "ArrowRight") {
          showNextImage();
          updateLightboxContent(currentGalleryIndex);
        }
        return;
      }

      if (e.key === "ArrowLeft") showPrevImage();
      else if (e.key === "ArrowRight") showNextImage();
    });

    addSwipeSupport(featuredStage, () => showNextImage(), () => showPrevImage());
    addSwipeSupport(lightboxInner, () => {
      showNextImage();
      updateLightboxContent(currentGalleryIndex);
    }, () => {
      showPrevImage();
      updateLightboxContent(currentGalleryIndex);
    });

    document.getElementById("btnEL").addEventListener("click", () => setLang("el"));
    document.getElementById("btnEN").addEventListener("click", () => setLang("en"));

    window.addEventListener("resize", scheduleLogoSync);

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(scheduleLogoSync);
    }

    initGallery();
    initFaq();
    setLang(getInitialLang());
    scheduleLogoSync();
    updateWhatsAppLink();
  </script>
