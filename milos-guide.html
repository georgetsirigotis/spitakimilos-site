<!doctype html>
<html lang="el" id="htmlRoot">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title id="metaTitle">George’s Milos Guide | Spitaki Milos</title>
  <meta id="metaDesc" name="description" content="George’s Milos Guide από το Spitaki Milos: τοπικές προτάσεις, boat tours, transfers, car rental και welcome packs για τη διαμονή στη Μήλο." />
  <link rel="canonical" href="https://spitakimilos.com/milos-guide.html" />

  <style>
    :root{
      --bgTop:#c7ecff;
      --bgMid:#f7fcff;
      --bgBottom:#ffedc8;
      --card:rgba(255,255,255,.94);
      --card2:rgba(255,255,255,.86);
      --text:#08263a;
      --muted:#2f5c73;
      --accent:#0ea5e9;
      --accent2:#fb7185;
      --accent3:#f59e0b;
      --accentDark:#0b7fb4;
      --border:rgba(8,38,58,.11);
      --shadow:0 18px 55px rgba(8,38,58,.16);
      --shadowSoft:0 12px 30px rgba(8,38,58,.09);
      --success:#10b981;
    }

    *{box-sizing:border-box}

    html{
      scroll-behavior:smooth;
      width:100%;
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 520px at 18% 0%, rgba(14,165,233,.42), transparent 62%),
        radial-gradient(900px 520px at 88% 8%, rgba(251,113,133,.22), transparent 60%),
        radial-gradient(900px 520px at 70% 95%, rgba(245,158,11,.18), transparent 60%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 35%, var(--bgBottom) 100%);
    }

    a{color:inherit;text-decoration:none}
    img{max-width:100%}

    .wrap{
      max-width:1180px;
      width:min(1180px, calc(100% - 24px));
      margin:0 auto;
      padding:18px 12px 70px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      flex-wrap:wrap;
      gap:14px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      min-width:0;
    }

    .brand .logo{
      height:clamp(120px, 10vw, 180px);
      width:520px;
      max-width:100%;
      object-fit:contain;
      display:block;
      margin-bottom:8px;
      filter:drop-shadow(0 2px 10px rgba(8,38,58,.18));
    }

    .brand span{
      font-size:13px;
      color:var(--muted);
    }

    .topActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 14px;
      border-radius:15px;
      font-weight:750;
      cursor:pointer;
      transition:transform .08s ease, box-shadow .14s ease, background .14s ease, border-color .14s ease;
      user-select:none;
      border:1px solid transparent;
      line-height:1.2;
      font:inherit;
    }

    .btn:active{transform:translateY(1px)}

    .btn.primary{
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      color:#fff;
      border:none;
      box-shadow:0 12px 24px rgba(14,165,233,.24);
    }

    .btn.primary:hover{box-shadow:0 16px 30px rgba(14,165,233,.30)}

    .btn.ghost{
      background:rgba(255,255,255,.84);
      border:1px solid var(--border);
      color:var(--text);
      backdrop-filter:blur(10px);
    }

    .btn.ghost:hover{
      background:rgba(255,255,255,.95);
      box-shadow:0 10px 22px rgba(8,38,58,.08);
    }

    .btn.full{width:100%}

    .langSwitch{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .langBtn{
      padding:10px 12px;
      border-radius:999px;
      font-weight:800;
      letter-spacing:.4px;
    }

    .langBtn.active{
      background:rgba(14,165,233,.18);
      border:1px solid rgba(14,165,233,.35);
    }

    .card{
      background:linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid var(--border);
      border-radius:26px;
      box-shadow:var(--shadow);
      backdrop-filter:saturate(125%) blur(8px);
    }

    .hero{
      padding:30px;
      margin-bottom:18px;
      overflow:hidden;
      position:relative;
      background:
        radial-gradient(560px 260px at 0% 0%, rgba(14,165,233,.16), transparent 70%),
        radial-gradient(520px 260px at 100% 100%, rgba(251,113,133,.11), transparent 70%),
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88));
    }

    .heroKicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(8,38,58,.08);
      box-shadow:0 8px 18px rgba(8,38,58,.05);
      font-size:12px;
      font-weight:850;
      margin-bottom:14px;
    }

    .heroDot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--success);
      box-shadow:0 0 0 6px rgba(16,185,129,.12);
    }

    .hero h1{
      margin:0 0 12px;
      font-size:44px;
      line-height:1.02;
      letter-spacing:-.45px;
      max-width:860px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.8;
      max-width:850px;
      font-size:17px;
    }

    .heroBadges{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .heroBadge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(14,165,233,.10);
      border:1px solid rgba(14,165,233,.14);
      color:#0b4f71;
      font-size:13px;
      font-weight:700;
    }

    .quickNav{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin:18px 0;
    }

    .quickLink{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(8,38,58,.08);
      box-shadow:0 10px 22px rgba(8,38,58,.06);
      transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    }

    .quickLink:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(8,38,58,.10);
      border-color:rgba(14,165,233,.24);
    }

    .quickIcon{
      width:38px;
      height:38px;
      min-width:38px;
      border-radius:13px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(14,165,233,.10);
      color:var(--accentDark);
      font-weight:900;
    }

    .quickTitle{
      display:block;
      font-weight:850;
      margin-bottom:4px;
      line-height:1.25;
    }

    .quickText{
      display:block;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }

    .sectionTitleWrap{
      margin:26px 0 12px;
      display:flex;
      flex-wrap:wrap;
      align-items:end;
      justify-content:space-between;
      gap:12px;
    }

    .sectionTitle{
      margin:0;
      font-size:28px;
      letter-spacing:-.3px;
    }

    .sectionText{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      max-width:760px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .guideCard{
      padding:20px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88));
      border:1px solid rgba(8,38,58,.08);
      box-shadow:var(--shadowSoft);
    }

    .guideCardHeader{
      display:flex;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }

    .guideIcon{
      width:48px;
      height:48px;
      min-width:48px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(14,165,233,.10);
      color:var(--accentDark);
      font-size:21px;
      font-weight:900;
    }

    .guideCardTitle{
      margin:0;
      font-size:20px;
      font-weight:850;
      line-height:1.25;
    }

    .guideCardSub{
      margin:5px 0 0;
      color:var(--muted);
      line-height:1.65;
      font-size:14px;
    }

    .guideList{
      margin:0;
      padding-left:18px;
      color:var(--muted);
      line-height:1.85;
    }

    .guideList li{margin-bottom:3px}

    .notice{
      margin-top:14px;
      padding:14px;
      border-radius:18px;
      background:rgba(245,158,11,.10);
      border:1px solid rgba(245,158,11,.18);
      color:#76520a;
      font-size:13px;
      line-height:1.65;
    }

    .packGrid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:12px;
    }

    .packItem{
      padding:13px;
      border-radius:16px;
      background:rgba(14,165,233,.06);
      border:1px solid rgba(14,165,233,.10);
    }

    .packItem b{
      display:block;
      margin-bottom:4px;
      font-size:14px;
    }

    .packItem span{
      display:block;
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }

    .ctaBox{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .contactCard{
      padding:20px;
      margin-top:18px;
    }

    .contactCard b{
      display:block;
      font-size:20px;
      margin-bottom:8px;
    }

    .contactCard p{
      color:var(--muted);
      margin:0;
      line-height:1.75;
    }

    .footer{
      margin:28px 0 0;
      color:rgba(8,38,58,.55);
      font-size:13px;
    }

    @media (max-width:1050px){
      .quickNav{grid-template-columns:repeat(2,1fr)}
    }

    @media (max-width:880px){
      .wrap{
        width:min(100%, calc(100% - 16px));
        padding:16px 8px 56px;
      }

      .brand .logo{height:140px}

      .hero{padding:24px}
      .hero h1{font-size:32px}
      .hero p{font-size:16px}
      .grid{grid-template-columns:1fr}
    }

    @media (max-width:650px){
      .quickNav,
      .packGrid{grid-template-columns:1fr}

      .topActions,
      .topActions .btn{
        width:100%;
      }

      .langSwitch{width:100%}
      .langSwitch .btn{width:auto;flex:1}
    }
  </style>
</head>

    let currentLang = "el";

    function getInitialLang(){
      const urlLang = new URLSearchParams(window.location.search).get("lang");
      if(urlLang && T[urlLang]) return urlLang;

      const saved = localStorage.getItem("site_lang");
      if(saved && T[saved]) return saved;

      const nav = (navigator.language || "").toLowerCase();
      if(nav.startsWith("en")) return "en";
      return "el";
    }

    function setUrlLangParam(lang){
      const url = new URL(window.location.href);
      url.searchParams.set("lang", lang);
      window.history.replaceState({}, "", url.toString());
    }

    function applyTranslations(lang){
      const tr = T[lang] || T.el;

      document.documentElement.lang = lang;
      document.getElementById("metaTitle").textContent = tr.meta_title;
      document.getElementById("metaDesc").setAttribute("content", tr.meta_desc);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        const val = tr[key];
        if(typeof val === "undefined") return;
        el.textContent = val;
      });

      document.getElementById("btnEL").classList.toggle("active", lang === "el");
      document.getElementById("btnEN").classList.toggle("active", lang === "en");
    }

    function setLang(lang){
      if(!T[lang]) return;
      currentLang = lang;
      localStorage.setItem("site_lang", lang);
      setUrlLangParam(lang);
      applyTranslations(lang);
    }

    document.getElementById("year").textContent = new Date().getFullYear();
    document.getElementById("btnEL").addEventListener("click", () => setLang("el"));
    document.getElementById("btnEN").addEventListener("click", () => setLang("en"));

    setLang(getInitialLang());
  </script>
